services:

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  scraper:
    build: ./scraper-service
    container_name: scraper-service

    depends_on:
      - redis

    env_file:
      - ./scraper-service/.env

    volumes:
      - ./scraper-service:/app

    networks:
      - smart-network

    restart: unless-stopped

  ai-engine:
    build: ./ai-engine
    container_name: ai-engine

    ports:
      - "8000:8000"

    env_file:
      - ./ai-engine/.env

    depends_on:
      - redis

    networks:
      - smart-network

    restart: unless-stopped

  ai-worker:
    build: ./scraper-service
    container_name: ai-worker

    command: python services/ai_worker.py

    depends_on:
      - redis
      - ai-engine

    env_file:
      - ./scraper-service/.env

    networks:
      - smart-network

    restart: unless-stopped


networks:
  smart-network:
    driver: bridge